<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Bazaar</title>
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/3649/3649531.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      scroll-behavior: auto;
      /* Faster than smooth for performance */
    }

    /* Fast Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #0f172a;
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.99);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes cartBounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-3px);
      }
    }

    @keyframes tickerScroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* Accelerated Animation Timings */
    .animate-fadeIn {
      animation: fadeIn 0.3s cubic-bezier(0.2, 0, 0.2, 1) forwards;
    }

    .animate-scaleIn {
      animation: scaleIn 0.25s cubic-bezier(0.2, 0, 0.2, 1) forwards;
    }

    .animate-cartBounce {
      animation: cartBounce 0.2s ease-in-out;
    }

    /* Heading Animations */
    @keyframes headingReveal {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.97);
        filter: blur(8px);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes headingGradientShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes headingLetterSpacing {
      0% {
        letter-spacing: 0.05em;
        opacity: 0;
      }

      50% {
        letter-spacing: -0.04em;
      }

      100% {
        letter-spacing: -0.05em;
        opacity: 1;
      }
    }

    @keyframes subtitleSlide {
      0% {
        opacity: 0;
        transform: translateX(-20px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .heading-animate {
      opacity: 0;
    }

    .heading-animate.heading-visible {
      animation: headingReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .heading-animate.heading-visible .heading-gradient-text {
      background-size: 200% 200%;
      animation: headingGradientShift 6s ease-in-out infinite;
      animation-delay: 0.8s;
    }

    .heading-animate.heading-visible .heading-subtitle {
      animation: subtitleSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.3s;
      opacity: 0;
    }

    .heading-stagger-1 {
      animation-delay: 0.1s !important;
    }

    .heading-stagger-2 {
      animation-delay: 0.2s !important;
    }

    /* Sub-heading & Card Animations */
    @keyframes subHeadingFadeUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes headingSlideIn {
      0% {
        opacity: 0;
        transform: translateX(-15px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes headingPopIn {
      0% {
        opacity: 0;
        transform: scale(0.92);
        filter: blur(4px);
      }

      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    .sub-heading-reveal {
      opacity: 0;
    }

    .sub-heading-reveal.heading-visible {
      animation: subHeadingFadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .card-heading-animate {
      animation: subHeadingFadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.15s;
    }

    .modal-heading-animate {
      animation: headingPopIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.2s;
    }

    .page-sub-heading-animate {
      animation: subHeadingFadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.25s;
    }

    .footer-heading-reveal {
      opacity: 0;
    }

    .footer-heading-reveal.heading-visible {
      animation: headingSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-ticker {
      animation: tickerScroll 20s linear infinite;
    }

    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .hero-gradient {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    .premium-card {
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      will-change: transform, box-shadow;
    }

    .premium-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15), 0 18px 36px -18px rgba(0, 0, 0, 0.1);
    }

    .shimmer {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    /* Dropdown Hover Effects */
    .group:hover .group-hover-visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .group-hover-visible {
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.2s ease-out;
    }

    /* Print Specifics for Receipts */
    @media print {
      body * {
        visibility: hidden;
      }

      .receipt-print,
      .receipt-print * {
        visibility: visible;
      }

      .receipt-print {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        box-shadow: none !important;
        border: none !important;
      }

      .no-print {
        display: none !important;
      }
    }
  </style>

</html>
